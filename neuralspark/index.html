<!DOCTYPE html>
<html>
<head>

    For more details:

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Play 80+ daily brain games & puzzles across memory, math, attention, language, spatial, and creativity challenges. Build a streak, take the Daily Challenge, and enjoy calm daily practice — free, no install, in your browser.">

  <!-- Search engines: allow indexing of the web app -->

  <link rel="canonical" href="https://wizuslabs.com/neuralspark/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="NeuralSpark">
  <meta property="og:title" content="NeuralSpark — Daily Brain Games & Puzzles">
  <meta property="og:description" content="Play 80+ daily brain games & puzzles across memory, math, attention, language, spatial, and creativity challenges. Build a streak, take the Daily Challenge, and enjoy calm daily practice — free in your browser.">
  <meta property="og:url" content="https://wizuslabs.com/neuralspark/">
  <meta property="og:image" content="https://wizuslabs.com/neuralspark/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="NeuralSpark — Daily Brain Games & Puzzles">
  <meta name="twitter:description" content="Play 80+ daily brain games & puzzles across memory, math, attention, language, spatial, and creativity challenges. Build a streak and enjoy calm daily practice — free in your browser.">
  <meta name="twitter:image" content="https://wizuslabs.com/neuralspark/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NeuralSpark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NeuralSpark — Daily Brain Games & Puzzles</title>
  <link rel="manifest" href="manifest.json">

  <!-- schema.org structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "NeuralSpark",
    "url": "https://wizuslabs.com/neuralspark/",
    "description": "Play 80+ daily brain games & puzzles across memory, math, attention, language, spatial, and creativity challenges. Build a streak, take the Daily Challenge, and enjoy calm daily practice — free in your browser.",
    "applicationCategory": "GameApplication",
    "applicationSubCategory": "EducationalApplication",
    "operatingSystem": "Web, iOS, Android",

      "priceCurrency": "USD"
    },
    "publisher": {
      "@type": "Organization",
      "name": "WizusLabs",
      "url": "https://wizuslabs.github.io"
    }
  }
  </script>
</head>
